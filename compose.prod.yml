services:
  back:
    image: lilipix/book-nest-backend:latest
    env_file:
      - database.env
      - backend.env
  db:
    image: postgres
    ports:
      - 4001:5432
    env_file:
      - database.env
    volumes:
      - dbdata:/var/lib/postgresql/data
  nginx:
    image: nginx
    volumes:
      - ./nginx-prod:/etc/nginx
    ports:
      - 4000:80
    depends_on:
      - back

volumes:
  dbdata:
    driver: local
